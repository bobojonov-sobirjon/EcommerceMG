  description: Страница «О компании» с метриками.
- name: Новости
  description: Лента материалов с фильтром по типу и пагинацией.
- name: Обращения
  description: Форма обратной связи (POST).
- name: Контакты
  description: Адрес, email и каналы связи по телефонам.
- name: Производители
  description: Список партнёрских брендов и детальные карточки.
- name: Каталог — товары
  description: 'Каталог запчастей и шин: фильтрация по типу, производителю, цене,
    поиск по названию, артикулу и описанию, сортировка по цене (order_price=asc|desc).'
- name: Заказы
  description: Приём заказов с корзины (гостевая отправка через POST).
