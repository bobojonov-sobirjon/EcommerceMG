{% extends "admin/base.html" %}

{% block messages %}
{% if admin_pending_orders_count %}
<div class="alert alert-info alert-dismissible fade show" role="alert">
    <i class="fas fa-bell me-1"></i>
    Новые заявки (заказы): <strong>{{ admin_pending_orders_count }}</strong>.
    <a href="{% url 'admin:commerce_order_changelist' %}?is_seen_moderator__exact=1" class="alert-link">Открыть список</a>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
{% endif %}
{{ block.super }}
{% endblock %}
